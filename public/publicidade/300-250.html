<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ad 300x250</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: transparent;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.snsrsv.com/sdk.js"></script>
    <script>
      try {
        var adId = "300-250";
        var defaultToken = "02cda84a0e4149c2855e170b9c26dedd";
        var width = "300";
        var height = "250";

        var savedToken = localStorage.getItem("ad_token_" + adId) || defaultToken;

        var interval = setInterval(function() {
          if (typeof sdk !== 'undefined') {
            clearInterval(interval);
            new sdk(savedToken)
              .setSize(width, height)
              .start();
          }
        }, 50);
      } catch (e) {
        console.error("Ad load error:", e);
      }
    </script>
  </body>
</html>
